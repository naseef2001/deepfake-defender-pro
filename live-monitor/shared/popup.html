<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        .status-card {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 13px;
        }
        .ip-address {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.02);
        }
        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 10px;
            opacity: 0.7;
        }
        .secure-badge {
            color: #00ff00;
            font-size: 11px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🛡️ Deepfake Defender</h2>
        <p>Real-time protection for Google Meet</p>
    </div>
    
    <div class="status-card">
        <div class="status-row">
            <span>Status:</span>
            <span id="status">Checking...</span>
        </div>
        <div class="status-row">
            <span>Kali VM:</span>
            <span class="ip-address">192.168.152.128</span>
        </div>
        <div class="status-row">
            <span>Security:</span>
            <span class="secure-badge">🔒 HTTPS/WSS</span>
        </div>
    </div>
    
    <button class="button" id="testBtn">Test Connection</button>
    
    <div class="footer">
        v1.0.0 | Active on Google Meet
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
