<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deepfake Defender Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        h1 {
            margin: 0 0 10px 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .section h3 {
            margin: 0 0 20px 0;
            color: #444;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        
        .setting-item input, .setting-item select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-item input {
            width: auto;
        }
        
        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        
        .button:hover {
            background: #5a67d8;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🛡️</span>
            Deepfake Defender Settings
        </h1>
        <div class="subtitle">Configure your real-time protection settings</div>
        
        <div class="section">
            <h3>🔌 Connection Settings</h3>
            
            <div class="setting-item">
                <label>Kali VM IP Address</label>
                <input type="text" id="kali-ip" value="192.168.152.128" placeholder="192.168.152.128">
                <div style="font-size: 12px; color: #888; margin-top: 5px;">Your Kali VM's IP address</div>
            </div>
        </div>
        
        <div class="section">
            <h3>🎥 Detection Settings</h3>
            
            <div class="checkbox-item">
                <input type="checkbox" id="face-detection" checked>
                <label>Face/Video Deepfake Detection</label>
            </div>
            
            <div class="checkbox-item">
                <input type="checkbox" id="voice-detection" checked>
                <label>Voice/Audio Deepfake Detection</label>
            </div>
            
            <div class="checkbox-item">
                <input type="checkbox" id="chat-detection" checked>
                <label>Chat Message AI Detection</label>
            </div>
            
            <div class="setting-item">
                <label>Detection Threshold</label>
                <select id="threshold">
                    <option value="0.5">Normal (50%)</option>
                    <option value="0.6" selected>Strict (60%)</option>
                    <option value="0.7">Very Strict (70%)</option>
                    <option value="0.8">Maximum (80%)</option>
                </select>
            </div>
        </div>
        
        <div class="section">
            <h3>🎨 Display Settings</h3>
            
            <div class="checkbox-item">
                <input type="checkbox" id="show-overlay" checked>
                <label>Show overlay on Google Meet</label>
            </div>
            
            <div class="setting-item">
                <label>Theme</label>
                <select id="theme">
                    <option value="dark" selected>Dark</option>
                    <option value="light">Light</option>
                    <option value="system">System Default</option>
                </select>
            </div>
        </div>
        
        <div class="info-box">
            <strong>📊 Current Status</strong><br>
            Extension is active and protecting your meetings.
            Make sure Kali VM is running with IP: <span id="current-ip">192.168.152.128</span>
        </div>
        
        <button class="button" id="saveBtn">Save Settings</button>
        <button class="button" id="testBtn" style="background: #48bb78; margin-top: 10px;">Test Connection</button>
        
        <div id="statusMessage" class="status-message"></div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
